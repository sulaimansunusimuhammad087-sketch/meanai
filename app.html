<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeanAI — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    /* ════════════════════════════════════════
       TOKENS
    ════════════════════════════════════════ */
    :root{
      --ink:#0c0d11;--ink2:#111318;--ink3:#1a1c24;--ink4:#252830;
      --muted:#6b7280;--sub:#9ca3b0;--white:#ffffff;
      --lime:#c8f135;--limd:#a8d01a;--teal:#00bfa5;--coral:#ff5f57;--sky:#4facfe;
      --sw:268px;--hh:62px;--r:12px;--rl:18px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Instrument Sans',sans-serif;background:var(--ink);color:var(--white);-webkit-font-smoothing:antialiased;display:flex}

    /* ════════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════════ */
    .sb{
      width:var(--sw);flex-shrink:0;height:100vh;
      background:var(--ink2);border-right:1px solid var(--ink4);
      display:flex;flex-direction:column;
      transition:width .3s ease;overflow:hidden;position:relative;z-index:30;
    }
    .sb.col{width:64px}
    .sb-brand{
      height:var(--hh);display:flex;align-items:center;
      padding:0 14px;gap:10px;border-bottom:1px solid var(--ink4);flex-shrink:0;
    }
    .bm{width:34px;height:34px;border-radius:9px;background:var(--lime);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .bm svg{width:18px;height:18px}
    .bn{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1.1rem;white-space:nowrap;transition:opacity .2s}
    .bn em{color:var(--lime);font-style:normal}
    .sb.col .bn{opacity:0;pointer-events:none}
    .sb-tog{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;transition:all .2s;flex-shrink:0}
    .sb-tog:hover{background:var(--ink4);color:var(--white)}

    .sb-new{
      margin:12px;padding:10px 14px;
      background:rgba(200,241,53,.08);border:1px dashed rgba(200,241,53,.3);
      border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;
      color:var(--lime);font-family:'Instrument Sans',sans-serif;
      font-size:.875rem;font-weight:600;transition:all .2s;white-space:nowrap;overflow:hidden;
    }
    .sb-new:hover{background:rgba(200,241,53,.15);border-color:var(--lime)}
    .sb-new i{flex-shrink:0}
    .sb.col .sb-new span{display:none}
    .sb.col .sb-new{padding:10px;justify-content:center}

    .sb-lbl{padding:12px 16px 6px;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;transition:opacity .2s}
    .sb.col .sb-lbl{opacity:0}

    .sb-subjs{padding:0 8px;flex-shrink:0}
    .sj-btn{
      width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;
      border:none;background:none;border-radius:9px;color:var(--sub);
      font-family:'Instrument Sans',sans-serif;font-size:.875rem;font-weight:500;
      cursor:pointer;transition:all .18s;text-align:left;overflow:hidden;white-space:nowrap;
    }
    .sj-btn:hover{background:var(--ink3);color:var(--white)}
    .sj-btn.on{background:rgba(200,241,53,.1);color:var(--lime)}
    .sj-btn .ico{flex-shrink:0;font-size:1.1rem;width:24px;text-align:center}
    .sb.col .sj-btn span:not(.ico){display:none}

    .sb-hist{flex:1;overflow-y:auto;padding:0 8px 8px}
    .sb-hist::-webkit-scrollbar{width:3px}
    .sb-hist::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:2px}
    .h-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .18s;white-space:nowrap;overflow:hidden}
    .h-item:hover{background:var(--ink3)}
    .h-item.on{background:var(--ink4)}
    .h-item i{flex-shrink:0;color:var(--muted);font-size:.8rem}
    .h-item span{font-size:.82rem;color:var(--sub);overflow:hidden;text-overflow:ellipsis}
    .sb.col .h-item span{display:none}

    .sb-foot{border-top:1px solid var(--ink4);padding:12px;flex-shrink:0}
    .u-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;overflow:hidden}
    .u-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--lime),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:.95rem;color:var(--ink)}
    .u-inf{flex:1;overflow:hidden}
    .u-nm{font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .u-rl{font-size:.7rem;color:var(--muted)}
    .sb.col .u-inf{display:none}
    .u-out{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:7px;font-size:.85rem;transition:all .2s;flex-shrink:0}
    .u-out:hover{color:var(--coral);background:rgba(255,95,87,.1)}
    .sb.col .u-out{display:none}

    /* ════════════════════════════════════════
       MAIN
    ════════════════════════════════════════ */
    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

    .top{
      height:var(--hh);border-bottom:1px solid var(--ink4);
      display:flex;align-items:center;padding:0 20px;gap:12px;
      background:rgba(17,19,24,.9);backdrop-filter:blur(10px);flex-shrink:0;
    }
    .mob-btn{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;font-size:1rem}
    .top-info{flex:1}
    .top-t{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1rem}
    .top-s{font-size:.73rem;color:var(--muted);margin-top:1px}
    .top-st{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--lime)}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--lime);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,241,53,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(200,241,53,0)}}

    /* ════════════════════════════════════════
       MESSAGES
    ════════════════════════════════════════ */
    .msgs-wrap{flex:1;overflow-y:auto}
    .msgs-wrap::-webkit-scrollbar{width:5px}
    .msgs-wrap::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:4px}
    .msgs-inner{max-width:800px;margin:0 auto;padding:32px 20px;display:flex;flex-direction:column;gap:28px;min-height:100%}

    /* Welcome */
    .welcome{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;text-align:center;
      padding:50px 20px 30px;gap:24px;
      min-height:calc(100vh - var(--hh) - 140px);
    }
    .w-orb{
      width:84px;height:84px;border-radius:22px;background:var(--lime);
      display:flex;align-items:center;justify-content:center;font-size:2.4rem;
      box-shadow:0 10px 36px rgba(200,241,53,.28);animation:bob 3s ease-in-out infinite;
    }
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .welcome h2{font-family:'Cabinet Grotesk',sans-serif;font-size:2rem;font-weight:900;letter-spacing:-.03em}
    .welcome h2 em{color:var(--lime);font-style:normal}
    .welcome p{color:var(--sub);max-width:42ch;line-height:1.65;font-size:.975rem}

    .qgrid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));max-width:680px;width:100%}
    .qcard{
      background:var(--ink3);border:1px solid var(--ink4);border-radius:var(--r);
      padding:15px 16px;text-align:left;cursor:pointer;transition:all .2s;
    }
    .qcard:hover{border-color:rgba(200,241,53,.4);background:rgba(200,241,53,.04);transform:translateY(-2px)}
    .qcard-i{font-size:1.3rem;margin-bottom:7px}
    .qcard-t{font-size:.82rem;color:var(--sub);line-height:1.4}
    .qcard-s{font-size:.7rem;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.05em}

    /* Messages */
    .msg-row{display:flex;gap:14px;animation:mi .3s ease}
    @keyframes mi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .msg-row.usr{flex-direction:row-reverse}
    .m-av{
      width:36px;height:36px;border-radius:50%;flex-shrink:0;
      align-self:flex-start;margin-top:2px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:.85rem;
    }
    .m-av.ai{background:var(--lime);color:var(--ink)}
    .m-av.hu{background:linear-gradient(135deg,var(--sky),#5f72ff);color:var(--white)}

    .m-body{flex:1;max-width:82%;display:flex;flex-direction:column;gap:5px}
    .usr .m-body{align-items:flex-end}

    .bbl{padding:13px 17px;border-radius:18px;line-height:1.7;font-size:.9375rem;word-break:break-word}
    .bbl.ai{background:var(--ink3);border:1px solid var(--ink4);border-bottom-left-radius:4px}
    .bbl.hu{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border-bottom-right-radius:4px}
    .m-meta{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:5px}
    .usr .m-meta{justify-content:flex-end}

    /* Markdown in AI bubble */
    .bbl.ai h1,.bbl.ai h2,.bbl.ai h3{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;letter-spacing:-.02em;margin:14px 0 7px}
    .bbl.ai h1{font-size:1.25rem}.bbl.ai h2{font-size:1.08rem}.bbl.ai h3{font-size:.97rem;color:var(--lime)}
    .bbl.ai p{margin-bottom:8px}.bbl.ai p:last-child{margin-bottom:0}
    .bbl.ai ul,.bbl.ai ol{padding-left:22px;margin:8px 0}.bbl.ai li{margin:5px 0}
    .bbl.ai strong{color:var(--lime);font-weight:700}
    .bbl.ai em{color:var(--sub);font-style:italic}
    .bbl.ai code{font-family:'Courier New',monospace;font-size:.82rem;background:rgba(0,0,0,.35);border:1px solid var(--ink4);padding:2px 7px;border-radius:5px;color:var(--teal)}
    .bbl.ai pre{background:var(--ink);border:1px solid var(--ink4);border-radius:10px;padding:15px;overflow-x:auto;margin:12px 0}
    .bbl.ai pre code{background:none;border:none;padding:0;font-size:.82rem;color:#e8eaf6}
    .bbl.ai blockquote{border-left:3px solid var(--lime);padding-left:14px;margin:10px 0;color:var(--sub)}
    .bbl.ai table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem}
    .bbl.ai th,.bbl.ai td{padding:8px 12px;border:1px solid var(--ink4);text-align:left}
    .bbl.ai th{background:var(--ink4);font-weight:700;color:var(--lime)}
    .bbl.ai tr:nth-child(even){background:rgba(255,255,255,.02)}
    .bbl.ai a{color:var(--sky);text-decoration:none}.bbl.ai a:hover{text-decoration:underline}
    .bbl.ai hr{border:none;border-top:1px solid var(--ink4);margin:14px 0}

    /* Typing */
    .ty-wrap{background:var(--ink3);border:1px solid var(--ink4);border-radius:18px 18px 18px 4px;padding:15px 20px;display:flex;align-items:center;gap:5px}
    .td{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:tp 1.4s infinite}
    .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
    @keyframes tp{0%,80%,100%{transform:scale(1);opacity:.5}40%{transform:scale(1.45);opacity:1}}

    /* ════════════════════════════════════════
       INPUT BAR
    ════════════════════════════════════════ */
    .inp-bar{padding:12px 20px 16px;background:rgba(17,19,24,.95);backdrop-filter:blur(10px);border-top:1px solid var(--ink4);flex-shrink:0}
    .toolbar{max-width:800px;margin:0 auto 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .chip{
      display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;
      background:var(--ink3);border:1px solid var(--ink4);color:var(--muted);
      font-family:'Instrument Sans',sans-serif;font-size:.78rem;font-weight:600;
      cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none;
    }
    .chip:hover{border-color:var(--sub);color:var(--white)}
    .ch-sep{width:1px;height:16px;background:var(--ink4)}
    .inp-wrap{
      max-width:800px;margin:0 auto;background:var(--ink3);border:1.5px solid var(--ink4);
      border-radius:16px;display:flex;align-items:flex-end;gap:8px;
      padding:10px 10px 10px 18px;transition:border-color .2s,box-shadow .2s;
    }
    .inp-wrap:focus-within{border-color:rgba(200,241,53,.5);box-shadow:0 0 0 3px rgba(200,241,53,.07)}
    .chat-ta{
      flex:1;background:none;border:none;outline:none;
      color:var(--white);font-family:'Instrument Sans',sans-serif;font-size:.9375rem;
      resize:none;max-height:180px;overflow-y:auto;line-height:1.6;min-height:24px;
    }
    .chat-ta::placeholder{color:var(--muted)}
    .send-btn{
      width:40px;height:40px;flex-shrink:0;border-radius:11px;border:none;cursor:pointer;
      background:var(--lime);display:flex;align-items:center;justify-content:center;
      font-size:.9rem;color:var(--ink);transition:all .2s;
    }
    .send-btn:hover{background:var(--limd);transform:scale(1.06)}
    .send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .inp-hint{max-width:800px;margin:8px auto 0;text-align:center;font-size:.7rem;color:var(--muted)}
    .inp-hint kbd{background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;padding:1px 5px;font-size:.65rem}

    /* Error banner */
    .err-banner{
      max-width:800px;margin:0 auto 10px;padding:10px 16px;
      background:rgba(255,95,87,.1);border:1px solid rgba(255,95,87,.25);
      border-radius:10px;font-size:.82rem;color:#ff8b86;display:none;
      align-items:center;gap:8px;
    }
    .err-banner.show{display:flex}
    .err-banner button{margin-left:auto;background:none;border:none;color:#ff8b86;cursor:pointer;font-size:.9rem}

    /* Mobile overlay */
    .mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:29}

    @media(max-width:768px){
      .sb{position:fixed;left:0;top:0;z-index:30;transform:translateX(-100%);width:var(--sw)!important;transition:transform .3s}
      .sb.mob-on{transform:translateX(0)}
      .mob-ov.vis{display:block}
      .mob-btn{display:flex}
      .msgs-inner{padding:20px 14px}
      .inp-bar{padding:10px 14px 14px}
    }
    @media(max-width:480px){.qgrid{grid-template-columns:1fr}.welcome h2{font-size:1.6rem}}
  </style>
</head>
<body>

<div class="mob-ov" id="mobOv" onclick="closeMob()"></div>

<!-- ════════════ SIDEBAR ════════════ -->
<aside class="sb" id="sb">
  <div class="sb-brand">
    <div class="bm"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 7v6l7 5 7-5V7L10 2z" fill="#0c0d11" opacity=".85"/><circle cx="10" cy="10" r="3" fill="#0c0d11"/></svg></div>
    <span class="bn">Mean<em>AI</em></span>
    <button class="sb-tog" onclick="toggleSB()"><i class="fas fa-chevron-left" id="sbIco"></i></button>
  </div>

  <button class="sb-new" onclick="newChat()"><i class="fas fa-plus"></i><span>New Conversation</span></button>

  <div class="sb-lbl">Subjects</div>
  <div class="sb-subjs" id="subjList"></div>

  <div class="sb-lbl" style="margin-top:6px">Recent Chats</div>
  <div class="sb-hist" id="histList"></div>

  <div class="sb-foot">
    <div class="u-row">
      <div class="u-av" id="uAv">S</div>
      <div class="u-inf"><div class="u-nm" id="uNm">Student</div><div class="u-rl">MeanAI Member</div></div>
      <button class="u-out" onclick="logout()" title="Sign out"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
</aside>

<!-- ════════════ MAIN ════════════ -->
<div class="main">
  <header class="top">
    <button class="mob-btn" onclick="openMob()"><i class="fas fa-bars"></i></button>
    <div class="top-info">
      <div class="top-t" id="topT">MeanAI — All Subjects</div>
      <div class="top-s" id="topS">Ask anything · Powered by Google Gemini · Free for you</div>
    </div>
    <div class="top-st"><div class="dot"></div><span>Online</span></div>
  </header>

  <div class="msgs-wrap" id="msgsWrap">
    <div class="msgs-inner" id="msgsInner"></div>
  </div>

  <div class="inp-bar">
    <div class="toolbar">
      <div class="err-banner" id="errBanner">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errMsg">Connection error</span>
        <button onclick="hideErr()"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="toolbar">
      <div class="chip" onclick="clearChat()"><i class="fas fa-broom"></i> Clear Chat</div>
      <div class="ch-sep"></div>
      <div class="chip" onclick="copyLast()"><i class="fas fa-copy"></i> Copy Last</div>
    </div>
    <div class="inp-wrap">
      <textarea
        class="chat-ta" id="chatIn"
        placeholder="Ask me anything — maths, stats, biology, chemistry, physics, English..."
        rows="1"
        onkeydown="onKey(event)"
        oninput="grow(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()"><i class="fas fa-arrow-up"></i></button>
    </div>
    <div class="inp-hint"><kbd>Enter</kbd> send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> new line</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG
//  After deploying your backend to Render.com, paste the
//  Render service URL below. It looks like:
//  https://meanai-backend.onrender.com
//  DO NOT put your API key here — it lives on Render.
// ════════════════════════════════════════════════════════════
const BACKEND = 'https://your-render-service.onrender.com'; // ← paste Render URL here

// ════════════════════════════════════════════════════════════
//  SUBJECTS
// ════════════════════════════════════════════════════════════
const BASE = r => `You are MeanAI, ${r}. You help students learn. Always:
- Break explanations into clear numbered steps
- Use **bold** key terms, ### headers, code blocks for formulas/code
- Give real examples; state formulas before applying them
- Be encouraging, clear and patient
- End long answers with a short summary
- Use tables when comparing things
Built by Sir Mean — Statistics student & future data scientist.`;

const SUBJS = {
  general:  {i:'🤖',n:'All Subjects',    s:BASE('a brilliant all-subject tutor covering maths, statistics, biology, chemistry, physics, English, geography, CS and every academic subject')},
  math:     {i:'📐',n:'Mathematics',     s:BASE('an expert maths tutor covering algebra, calculus, trigonometry, geometry and linear algebra. Show every step of working')},
  stats:    {i:'📊',n:'Statistics',      s:BASE('an expert statistics and probability tutor covering descriptive stats, distributions, hypothesis testing, confidence intervals and regression. Always show formulas and worked examples')},
  biology:  {i:'🧬',n:'Biology',         s:BASE('an expert biology tutor covering cell biology, genetics, ecology, evolution, anatomy and physiology')},
  chemistry:{i:'⚗️',n:'Chemistry',       s:BASE('an expert chemistry tutor covering atomic structure, bonding, reactions, stoichiometry and organic chemistry. Balance equations step by step')},
  physics:  {i:'⚡',n:'Physics',         s:BASE('an expert physics tutor covering mechanics, waves, electricity, magnetism, thermodynamics and quantum physics. Show formulas, units and full calculations')},
  english:  {i:'📝',n:'English',         s:BASE('an expert English tutor helping with grammar, essay writing, literary analysis, comprehension and vocabulary')},
  geo:      {i:'🌍',n:'Geography',       s:BASE('an expert geography tutor covering physical and human geography, climate, ecosystems, maps and population')},
  cs:       {i:'💻',n:'Computer Science',s:BASE('an expert CS and programming tutor covering algorithms, data structures, databases, networking, Python, Java and C++. Always include code examples')},
};

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let user    = null;
let subj    = 'general';
let history = [];
let sessions= [];
let sessId  = null;
let busy    = false;
let sbCol   = false;

// ════════════════════════════════════════════════════════════
//  INIT — auth guard
// ════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const s = localStorage.getItem('meanai_session');
  if (!s) { location.href = 'index.html'; return; }
  user = JSON.parse(s);
  document.getElementById('uNm').textContent = user.name || 'Student';
  document.getElementById('uAv').textContent = (user.name||'S').charAt(0).toUpperCase();
  buildSubjects();
  newChat();
});

// ════════════════════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════════════════════
function buildSubjects() {
  document.getElementById('subjList').innerHTML =
    Object.entries(SUBJS).map(([k,s]) =>
      `<button class="sj-btn ${k===subj?'on':''}" id="s-${k}" onclick="setSubj('${k}')">
         <span class="ico">${s.i}</span><span>${s.n}</span>
       </button>`
    ).join('');
}

function setSubj(k) {
  subj = k;
  document.querySelectorAll('.sj-btn').forEach(b=>b.classList.remove('on'));
  const b=document.getElementById('s-'+k); if(b) b.classList.add('on');
  document.getElementById('topT').textContent = 'MeanAI — '+SUBJS[k].n;
  document.getElementById('topS').textContent = SUBJS[k].i+' '+SUBJS[k].n+' · Powered by Google Gemini';
  closeMob();
}

function toggleSB() {
  sbCol=!sbCol;
  document.getElementById('sb').classList.toggle('col',sbCol);
  document.getElementById('sbIco').className=sbCol?'fas fa-chevron-right':'fas fa-chevron-left';
}
function openMob() { document.getElementById('sb').classList.add('mob-on'); document.getElementById('mobOv').classList.add('vis'); }
function closeMob(){ document.getElementById('sb').classList.remove('mob-on'); document.getElementById('mobOv').classList.remove('vis'); }

// ════════════════════════════════════════════════════════════
//  CHAT SESSIONS
// ════════════════════════════════════════════════════════════
function newChat() {
  sessId  = Date.now().toString(36);
  history = [];
  hideErr();
  renderWelcome();
}

function renderWelcome() {
  const fn = (user?.name||'Student').split(' ')[0];
  const qs = [
    {i:'📊',t:'Explain the Central Limit Theorem with a real example',s:'Statistics'},
    {i:'📐',t:'Solve ∫(3x²+2x) dx — show every step clearly',       s:'Calculus'},
    {i:'🧬',t:'How does DNA replication work, step by step?',         s:'Biology'},
    {i:'⚗️',t:'Balance: Fe + O₂ → Fe₂O₃ and explain the process',   s:'Chemistry'},
    {i:'⚡',t:'A ball thrown at 20 m/s — find range using kinematics',s:'Physics'},
    {i:'📝',t:'How do I write a strong argumentative essay?',          s:'English'},
  ];
  document.getElementById('msgsInner').innerHTML = `
    <div class="welcome">
      <div class="w-orb">🎓</div>
      <h2>Hello, <em>${fn}</em>!</h2>
      <p>I'm MeanAI — your free AI study companion. Ask me anything and I'll explain it clearly, step by step, in any subject.</p>
      <div class="qgrid">
        ${qs.map(q=>`
          <div class="qcard" onclick="useQ(this)">
            <div class="qcard-i">${q.i}</div>
            <div class="qcard-t">${q.t}</div>
            <div class="qcard-s">${q.s}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function useQ(el) {
  document.getElementById('chatIn').value = el.querySelector('.qcard-t').textContent;
  send();
}

function addSession(title) {
  sessions.unshift({id:sessId,title:title.slice(0,44)});
  document.getElementById('histList').innerHTML = sessions.slice(0,20).map(s=>
    `<div class="h-item ${s.id===sessId?'on':''}"><i class="fas fa-comment-alt"></i><span>${s.title}</span></div>`
  ).join('') || '<div style="padding:10px 12px;font-size:.78rem;color:var(--muted)">No chats yet</div>';
}

// ════════════════════════════════════════════════════════════
//  SEND & AI CALL
// ════════════════════════════════════════════════════════════
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function grow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,180)+'px'; }

async function send() {
  if(busy) return;
  const ta   = document.getElementById('chatIn');
  const text = ta.value.trim();
  if(!text) return;

  // Remove welcome screen
  const w=document.querySelector('.welcome'); if(w) w.remove();

  addMsg('hu', text);
  ta.value=''; ta.style.height='auto';

  if(history.length===0) addSession(text);
  history.push({role:'user', content:text});

  busy=true;
  document.getElementById('sendBtn').disabled=true;
  hideErr();

  const tid=showTyping();

  try {
    const reply = await callBackend(text);
    removeEl(tid);
    addMsg('ai', reply);
    history.push({role:'assistant', content:reply});
  } catch(err) {
    removeEl(tid);
    showErr(err.message);
    // Also show inline
    addMsg('ai', '❌ ' + err.message);
  }

  busy=false;
  document.getElementById('sendBtn').disabled=false;
  scrollBot();
}

async function callBackend() {
  // Check backend URL is configured
  if(!BACKEND || BACKEND.includes('your-render-service')) {
    throw new Error('Backend not configured yet. Please see README — deploy server.js to Render.com and paste the URL in app.html.');
  }

  const sys = SUBJS[subj]?.s || SUBJS.general.s;

  let res;
  try {
    res = await fetch(BACKEND + '/chat', {
      method : 'POST',
      headers: {'Content-Type':'application/json'},
      body   : JSON.stringify({
        messages    : history,
        systemPrompt: sys,
        subject     : subj,
      }),
    });
  } catch(netErr) {
    throw new Error('Cannot reach MeanAI server. Please check your internet connection and try again.');
  }

  const data = await res.json().catch(()=>({}));

  if(!res.ok) {
    throw new Error(data.error || 'Server error. Please try again in a moment.');
  }

  return data.reply || '(No response received — please try again)';
}

// ════════════════════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════════════════════
function addMsg(role, content) {
  const c   = document.getElementById('msgsInner');
  const id  = 'msg-'+Date.now();
  const t   = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const ini = (user?.name||'S').charAt(0).toUpperCase();

  c.insertAdjacentHTML('beforeend', role==='ai' ? `
    <div class="msg-row" id="${id}">
      <div class="m-av ai">M</div>
      <div class="m-body">
        <div class="bbl ai">${md(content)}</div>
        <div class="m-meta"><i class="fas fa-robot" style="font-size:.65rem"></i> MeanAI · ${t}</div>
      </div>
    </div>` : `
    <div class="msg-row usr" id="${id}">
      <div class="m-av hu">${ini}</div>
      <div class="m-body">
        <div class="bbl hu">${esc(content)}</div>
        <div class="m-meta">${t}</div>
      </div>
    </div>`);

  scrollBot();
  return id;
}

function showTyping() {
  const c=document.getElementById('msgsInner'); const id='ty-'+Date.now();
  c.insertAdjacentHTML('beforeend',`
    <div class="msg-row" id="${id}">
      <div class="m-av ai">M</div>
      <div class="m-body">
        <div class="ty-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div>
      </div>
    </div>`);
  scrollBot(); return id;
}

function removeEl(id){const e=document.getElementById(id);if(e)e.remove()}
function scrollBot(){const w=document.getElementById('msgsWrap');w.scrollTop=w.scrollHeight}

function showErr(msg) {
  document.getElementById('errMsg').textContent=msg;
  document.getElementById('errBanner').classList.add('show');
}
function hideErr(){document.getElementById('errBanner').classList.remove('show')}

function clearChat(){if(history.length&&!confirm('Clear this conversation?'))return;newChat()}

function copyLast(){
  const bs=document.querySelectorAll('.bbl.ai');if(!bs.length)return;
  const l=bs[bs.length-1];
  navigator.clipboard.writeText(l.innerText).catch(()=>{});
  l.style.transition='border-color .3s';l.style.borderColor='var(--lime)';
  setTimeout(()=>{l.style.borderColor=''},900);
}

function logout(){if(!confirm('Sign out?'))return;localStorage.removeItem('meanai_session');location.href='index.html'}

// ════════════════════════════════════════════════════════════
//  MARKDOWN RENDERER
// ════════════════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function md(raw){
  // 1. Protect code blocks
  const blocks=[];
  let s=raw.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    blocks.push(`<pre><code>${esc(code.trim())}</code></pre>`);
    return `\x00B${blocks.length-1}\x00`;
  });

  // 2. Escape HTML except tokens
  s=s.replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m));

  // 3. Restore code blocks
  blocks.forEach((b,i)=>{s=s.replace(`\x00B${i}\x00`,b)});

  // 4. Inline code
  s=s.replace(/`([^`\n]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);

  // 5. Headers
  s=s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  s=s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // 6. Bold & italic
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');

  // 7. HR
  s=s.replace(/^-{3,}$/gm,'<hr>');

  // 8. Blockquote
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');

  // 9. Lists
  s=s.replace(/^\d+\. (.+)$/gm,'<li class="ol">$1</li>');
  s=s.replace(/^[*\-+] (.+)$/gm,'<li>$1</li>');
  s=s.replace(/(<li class="ol">[\s\S]*?<\/li>\n?)+/g,m=>`<ol>${m.replace(/ class="ol"/g,'')}</ol>`);
  s=s.replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`);

  // 10. Links
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');

  // 11. Tables
  s=s.replace(/(\|.+\|\n)([\|\-: ]+\|\n)((?:\|.+\|\n?)*)/g,(_,h,sep,body)=>{
    const ths=h.trim().split('|').filter((_,i,a)=>i>0&&i<a.length).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs=body.trim().split('\n').filter(Boolean).map(r=>{
      const tds=r.split('|').filter((_,i,a)=>i>0&&i<a.length).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // 12. Paragraphs
  s=s.replace(/\n{2,}/g,'</p><p>');
  s=s.replace(/\n/g,'<br>');
  if(!s.match(/^<(h[1-6]|ul|ol|table|blockquote|pre|hr)/)) s='<p>'+s+'</p>';
  s=s.replace(/<p>(<h[1-6]|<ul|<ol|<table|<blockquote|<hr|<pre)/g,'$1');
  s=s.replace(/(<\/h[1-6]>|<\/ul>|<\/ol>|<\/table>|<\/pre>|<hr>)<\/p>/g,'$1');
  s=s.replace(/<p><\/p>/g,'');
  return s;
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMob()});
